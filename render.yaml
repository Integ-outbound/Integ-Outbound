databases:
  - name: integ-postgres
    databaseName: integ
    user: integ
    plan: starter

services:
  - type: web
    name: integ-api
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/ready
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: integ-postgres
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VERIFICATION_PROVIDER
        value: millionverifier
      - key: VERIFICATION_API_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: START_WORKER
        value: "false"
      - key: NODE_ENV
        value: production

  - type: worker
    name: integ-worker
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: integ-postgres
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VERIFICATION_PROVIDER
        value: millionverifier
      - key: VERIFICATION_API_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: START_WORKER
        value: "true"
      - key: NODE_ENV
        value: production
