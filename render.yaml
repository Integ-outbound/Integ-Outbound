databases:
  - name: integ-postgres
    databaseName: integ
    user: integ
    plan: starter

services:
  - type: web
    name: integ-api
    env: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build:api
    startCommand: npm start
    healthCheckPath: /api/v1/ready
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: integ-postgres
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VERIFICATION_PROVIDER
        value: millionverifier
      - key: VERIFICATION_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_GMAIL_SCOPES
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: MAILBOX_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: START_WORKER
        value: "false"
      - key: NODE_ENV
        value: production

  - type: worker
    name: integ-worker
    env: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build:api
    startCommand: npm run worker:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: integ-postgres
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VERIFICATION_PROVIDER
        value: millionverifier
      - key: VERIFICATION_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_GMAIL_SCOPES
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: MAILBOX_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: START_WORKER
        value: "true"
      - key: NODE_ENV
        value: production
